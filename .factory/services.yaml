commands:
  install: pnpm install
  dev: pnpm dev
  build: BETTER_AUTH_SECRET=dev-secret DATABASE_URL=postgresql://placeholder:placeholder@localhost/placeholder pnpm build
  test: pnpm test
  lint: pnpm lint
  lint:fix: pnpm lint:fix
  typecheck: pnpm ts

services:
  web:
    start: pnpm dev
    stop: lsof -ti :3000 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: []
