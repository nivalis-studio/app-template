commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit
pre-commit:
  parallel: true
  jobs:
    - run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      glob:
        - "*.cjs"
        - "*.mjs"
        - "*.d.cts"
        - "*.d.mts"
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      stage_fixed: true
    - run: pnpm run ts
    - name: large-file-check
      glob:
        - "*.ts"
        - "*.tsx"
      run: "wc -l {staged_files} | awk '$1 > 500 { print \"File too large:\", $2; exit 1 }'"
    - name: todo-fixme-check
      glob:
        - "*.ts"
        - "*.tsx"
      run: "grep -n 'TODO\\|FIXME\\|HACK\\|XXX' {staged_files} && echo 'WARNING: New TODO/FIXME/HACK/XXX markers found in staged files' || true"
